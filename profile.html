<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SugarAbsinthe - Profile Settings</title>
  <meta name="description" content="Edit personal profile fields used in homepage About Me panel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8ff;
      --bg-soft: #f2f7ff;
      --text: #181a2a;
      --muted: #5a607f;
      --line: #d8ddf2;
      --line-strong: #bec8ee;
      --primary: #6c4dff;
      --danger: #d03c62;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(49, 58, 118, 0.12);
      --max-width: 1040px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      font-size: 17px;
      color: var(--text);
      background:
        radial-gradient(42rem 24rem at -10% -10%, rgba(113, 132, 255, 0.2), transparent 62%),
        radial-gradient(30rem 18rem at 110% -8%, rgba(13, 160, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-soft) 100%);
    }

    .page {
      width: min(var(--max-width), 94vw);
      margin: 0 auto;
      padding: 1.35rem 0 2.5rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.9rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(72, 87, 164, 0.1);
      padding: 0.56rem 0.72rem;
      flex-wrap: wrap;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.62rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary) 0%, #5f8bff 100%);
      box-shadow: 0 8px 14px rgba(108, 77, 255, 0.25);
      display: inline-block;
    }

    .brand-text {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .btn-link {
      text-decoration: none;
      color: var(--muted);
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.46rem 0.78rem;
    }

    .btn-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: #fff;
    }

    .panel {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 1.1rem;
    }

    .panel h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3.2vw, 2.3rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .panel p {
      margin: 0.5rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .form {
      margin-top: 1rem;
      display: grid;
      gap: 0.75rem;
    }

    .field {
      display: grid;
      gap: 0.3rem;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 0.96rem;
      font-weight: 600;
      padding: 0.56rem 0.64rem;
    }

    .items-wrap {
      margin-top: 0.25rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fafbff;
      padding: 0.7rem;
      display: grid;
      gap: 0.56rem;
    }

    .items-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .items-list {
      display: grid;
      gap: 0.45rem;
    }

    .item-row {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 0.5rem;
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.2fr) auto;
      gap: 0.45rem;
      align-items: end;
    }

    .item-remove {
      border: 1px solid #efb1c4;
      border-radius: 9px;
      background: #fff5f8;
      color: #c13c64;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.46rem 0.58rem;
      cursor: pointer;
      min-height: 39px;
      white-space: nowrap;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.54rem 0.82rem;
      cursor: pointer;
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(120deg, var(--primary) 0%, #5f8bff 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(108, 77, 255, 0.22);
    }

    .btn-danger {
      color: var(--danger);
      border-color: #efb1c4;
      background: #fff5f8;
    }

    .actions {
      margin-top: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.44rem;
      align-items: center;
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    .status.error { color: #b42e51; }
    .status.success { color: #2f7a4e; }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .input:focus-visible,
    .btn:focus-visible,
    .btn-link:focus-visible,
    .item-remove:focus-visible,
    .brand:focus-visible {
      outline: 3px solid rgba(13, 160, 255, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 860px) {
      .item-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 16px;
      }

      .panel {
        padding: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">SugarAbsinthe</span>
      </a>
      <div class="top-actions">
        <a class="btn-link" href="./index.html">Back To Notes</a>
        <a class="btn-link" href="./editor.html">Open Editor</a>
        <span id="cloud-badge" class="btn-link">Cloud: Local Only</span>
      </div>
    </header>

    <main class="panel">
      <h1>Profile Settings</h1>
      <p>Edit the personal info shown in homepage About Me card. This editor stays outside homepage for a clean layout.</p>

      <form id="profile-form" class="form">
        <label class="field" for="title-input">
          <span class="label">Panel Title</span>
          <input id="title-input" class="input" type="text" maxlength="48" placeholder="About Me">
        </label>

        <label class="field" for="quote-input">
          <span class="label">Quote Line</span>
          <input id="quote-input" class="input" type="text" maxlength="140" placeholder="Live like summer flowers.">
        </label>

        <section class="items-wrap" aria-label="Custom profile items">
          <div class="items-head">
            <span class="label">Profile Items</span>
            <button id="add-item-btn" class="btn" type="button">+ Add Item</button>
          </div>
          <div id="items-list" class="items-list"></div>
          <p class="hint">Each row has a custom name and value. Empty row will be ignored on save.</p>
        </section>
      </form>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary" type="button">Save Profile</button>
        <button id="reset-btn" class="btn btn-danger" type="button">Reset Default</button>
        <a class="btn" href="./index.html">View Homepage</a>
        <p id="status" class="status"></p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./posts-store.js"></script>
  <script src="./cloud-sync.js"></script>
  <script>
    (() => {
      const titleInput = document.getElementById("title-input");
      const quoteInput = document.getElementById("quote-input");
      const itemsListEl = document.getElementById("items-list");
      const addItemBtn = document.getElementById("add-item-btn");
      const saveBtn = document.getElementById("save-btn");
      const resetBtn = document.getElementById("reset-btn");
      const statusEl = document.getElementById("status");
      const cloudBadgeEl = document.getElementById("cloud-badge");

      init();

      async function init() {
        await initCloudContext();
        renderForm(postStore.readProfile());
        bindEvents();
      }

      async function initCloudContext() {
        if (!window.cloudSync) {
          renderCloudBadge({ loggedIn: false });
          return;
        }

        const initial = await window.cloudSync.init();
        renderCloudBadge(initial);

        window.cloudSync.onAuthChanged((next) => {
          renderCloudBadge(next);
        });

        if (!initial.loggedIn) return;
        const pullResult = await window.cloudSync.pullFromCloud();
        if (!pullResult.ok) {
          setStatus("Cloud sync warning: " + pullResult.reason, "error");
        }
      }

      function renderCloudBadge(syncState) {
        if (!cloudBadgeEl) return;
        if (syncState && syncState.loggedIn) {
          const email = String(syncState.email || "").trim();
          cloudBadgeEl.textContent = email ? "Cloud: " + email : "Cloud: Signed In";
          return;
        }
        cloudBadgeEl.textContent = "Cloud: Local Only";
      }

      function bindEvents() {
        addItemBtn.addEventListener("click", () => {
          appendItemRow({ label: "", value: "" }, true);
        });

        itemsListEl.addEventListener("click", (event) => {
          const removeBtn = event.target.closest("[data-remove-item]");
          if (!removeBtn) return;
          const row = removeBtn.closest(".item-row");
          if (!row) return;
          row.remove();
          if (!itemsListEl.children.length) {
            appendItemRow({ label: "", value: "" }, false);
          }
        });

        saveBtn.addEventListener("click", onSave);
        resetBtn.addEventListener("click", onReset);
      }

      async function onSave() {
        const collection = collectItemsFromForm();
        if (!collection.ok) {
          setStatus(collection.reason, "error");
          if (collection.focusEl) collection.focusEl.focus();
          return;
        }

        const savedProfile = postStore.updateProfile({
          title: titleInput.value,
          quote: quoteInput.value,
          items: collection.items
        });

        if (window.cloudSync && window.cloudSync.getState && window.cloudSync.getState().loggedIn) {
          const pushResult = await window.cloudSync.pushProfile(savedProfile);
          if (!pushResult.ok) {
            setStatus("Profile saved locally, but cloud sync failed: " + pushResult.reason, "error");
          } else {
            setStatus("Profile updated and synced to cloud.", "success");
          }
        } else {
          setStatus("Profile updated locally.", "success");
        }

        renderForm(postStore.readProfile());
      }

      async function onReset() {
        if (!window.confirm("Reset profile to default values?")) return;
        const next = postStore.resetProfile();
        if (window.cloudSync && window.cloudSync.getState && window.cloudSync.getState().loggedIn) {
          const pushResult = await window.cloudSync.pushProfile(next);
          if (!pushResult.ok) {
            setStatus("Reset locally, but cloud sync failed: " + pushResult.reason, "error");
            renderForm(next);
            return;
          }
        }
        renderForm(next);
        setStatus("Profile reset to default.", "success");
      }

      function renderForm(profile) {
        titleInput.value = profile.title || "";
        quoteInput.value = profile.quote || "";

        itemsListEl.innerHTML = "";
        const rows = Array.isArray(profile.items) ? profile.items : [];
        if (!rows.length) {
          appendItemRow({ label: "", value: "" }, false);
          return;
        }

        rows.forEach((row) => {
          appendItemRow(row, false);
        });
      }

      function appendItemRow(seed, focusLabelInput) {
        const row = document.createElement("div");
        row.className = "item-row";

        const labelField = document.createElement("label");
        labelField.className = "field";
        const labelTag = document.createElement("span");
        labelTag.className = "label";
        labelTag.textContent = "Name";
        const labelInput = document.createElement("input");
        labelInput.className = "input";
        labelInput.type = "text";
        labelInput.maxLength = 32;
        labelInput.placeholder = "e.g. Focus";
        labelInput.value = String((seed && seed.label) || "");
        labelField.appendChild(labelTag);
        labelField.appendChild(labelInput);

        const valueField = document.createElement("label");
        valueField.className = "field";
        const valueTag = document.createElement("span");
        valueTag.className = "label";
        valueTag.textContent = "Value";
        const valueInput = document.createElement("input");
        valueInput.className = "input";
        valueInput.type = "text";
        valueInput.maxLength = 180;
        valueInput.placeholder = "e.g. mobile / frontend / dev tools";
        valueInput.value = String((seed && seed.value) || "");
        valueField.appendChild(valueTag);
        valueField.appendChild(valueInput);

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "item-remove";
        removeBtn.dataset.removeItem = "1";
        removeBtn.textContent = "Remove";

        row.appendChild(labelField);
        row.appendChild(valueField);
        row.appendChild(removeBtn);
        itemsListEl.appendChild(row);

        if (focusLabelInput) {
          labelInput.focus();
        }
      }

      function collectItemsFromForm() {
        const rows = Array.from(itemsListEl.querySelectorAll(".item-row"));
        const items = [];

        for (let i = 0; i < rows.length; i += 1) {
          const row = rows[i];
          const inputs = row.querySelectorAll(".input");
          const labelInput = inputs[0];
          const valueInput = inputs[1];
          const label = String(labelInput && labelInput.value || "").trim();
          const value = String(valueInput && valueInput.value || "").trim();

          if (!label && !value) continue;

          if (!label || !value) {
            return {
              ok: false,
              reason: "Each item needs both name and value.",
              focusEl: !label ? labelInput : valueInput,
              items: []
            };
          }

          items.push({
            label: label,
            value: value
          });
        }

        if (items.length > 12) {
          return {
            ok: false,
            reason: "You can save up to 12 profile items.",
            focusEl: null,
            items: []
          };
        }

        return {
          ok: true,
          reason: "",
          focusEl: null,
          items: items
        };
      }

      function setStatus(message, type) {
        statusEl.className = "status";
        if (type === "error") statusEl.classList.add("error");
        if (type === "success") statusEl.classList.add("success");
        statusEl.textContent = message;
      }
    })();
  </script>
</body>
</html>
