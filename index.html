<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Blog - Notes</title>
  <meta name="description" content="Simple notes list page with add, delete, and edit workflows.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,600;6..72,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8ff;
      --bg-soft: #f2f7ff;
      --card: #ffffff;
      --text: #181a2a;
      --muted: #5a607f;
      --line: #d8ddf2;
      --line-strong: #bec8ee;
      --primary: #6c4dff;
      --danger: #d03c62;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(49, 58, 118, 0.12);
      --max-width: 1040px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Outfit", sans-serif;
      color: var(--text);
      background:
        radial-gradient(42rem 24rem at -10% -10%, rgba(113, 132, 255, 0.2), transparent 62%),
        radial-gradient(30rem 18rem at 110% -8%, rgba(13, 160, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-soft) 100%);
    }

    .page {
      width: min(var(--max-width), 92vw);
      margin: 0 auto;
      padding: 1.2rem 0 2.6rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 24px rgba(72, 87, 164, 0.1);
      padding: 0.46rem 0.6rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary) 0%, #5f8bff 100%);
      box-shadow: 0 8px 14px rgba(108, 77, 255, 0.25);
      display: inline-block;
    }

    .brand-text {
      font-family: "Newsreader", serif;
      font-size: 1.14rem;
    }

    .primary-link {
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #5f8bff 100%);
      color: #fff;
      font-size: 0.84rem;
      font-weight: 700;
      padding: 0.48rem 0.82rem;
      box-shadow: 0 8px 16px rgba(108, 77, 255, 0.22);
    }

    .hero {
      margin-top: 0.9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(125deg, #ffffff 0%, #f7f7ff 62%, #f1f7ff 100%);
      box-shadow: var(--shadow);
      padding: 1rem 1.05rem;
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .hero h1 {
      margin: 0;
      font-family: "Newsreader", serif;
      font-size: clamp(1.7rem, 4.4vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .hero p {
      margin: 0.55rem 0 0;
      color: var(--muted);
      line-height: 1.56;
      max-width: 62ch;
      font-size: 0.92rem;
    }

    .count-badge {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.38rem 0.66rem;
    }

    .status {
      margin-top: 0.65rem;
      border: 1px solid #cce4d8;
      background: #f3fff8;
      color: #2f7a4e;
      border-radius: 11px;
      padding: 0.52rem 0.62rem;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .posts {
      margin-top: 0.82rem;
      display: grid;
      gap: 0.58rem;
    }

    .post-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 0.76rem 0.84rem;
      display: grid;
      gap: 0.52rem;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      gap: 0.45rem;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .post-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    .post-title a {
      color: inherit;
      text-decoration: none;
    }

    .post-title a:hover {
      text-decoration: underline;
    }

    .post-updated {
      margin: 0;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .post-excerpt {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.56;
      white-space: pre-wrap;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.81rem;
      font-weight: 700;
      padding: 0.38rem 0.62rem;
      cursor: pointer;
    }

    .btn:hover {
      border-color: #9fafe6;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #efb1c4;
      background: #fff5f8;
    }

    .empty {
      margin-top: 0.82rem;
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      background: #fff;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.58;
    }

    .footer {
      margin-top: 0.95rem;
      border-top: 1px solid var(--line);
      padding-top: 0.74rem;
      color: var(--muted);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .primary-link:focus-visible,
    .btn:focus-visible {
      outline: 3px solid rgba(13, 160, 255, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 16px;
      }

      .hero {
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">Astro Notes</span>
      </a>
      <a class="primary-link" href="./editor.html">+ Add Note</a>
    </header>

    <section class="hero">
      <div>
        <h1>Your Notes</h1>
        <p>Create, edit, and manage your notes. Entries are sorted by latest update time.</p>
      </div>
      <div class="count-badge">Total Notes: <span id="post-count">0</span></div>
    </section>

    <div id="saved-status" class="status" hidden>Note saved successfully.</div>

    <main>
      <div id="posts-list" class="posts" hidden></div>
      <div id="empty-state" class="empty" hidden>
        No notes yet. Click <strong>Add Note</strong> to create your first entry.
      </div>
    </main>

    <footer class="footer">
      <span>&copy; 2026 Astro Notes</span>
      <span><a href="./editor.html">Open Editor</a></span>
    </footer>
  </div>

  <script src="./posts-store.js"></script>
  <script>
    (() => {
      const listEl = document.getElementById("posts-list");
      const emptyEl = document.getElementById("empty-state");
      const countEl = document.getElementById("post-count");
      const savedStatusEl = document.getElementById("saved-status");

      init();

      function init() {
        showSavedStatusIfNeeded();
        render();
      }

      function render() {
        const posts = postStore.readPosts().sort((a, b) => Number(new Date(b.updatedAt)) - Number(new Date(a.updatedAt)));
        countEl.textContent = String(posts.length);
        listEl.innerHTML = "";

        if (!posts.length) {
          listEl.hidden = true;
          emptyEl.hidden = false;
          return;
        }

        emptyEl.hidden = true;
        listEl.hidden = false;

        const frag = document.createDocumentFragment();
        posts.forEach((post) => {
          const card = document.createElement("article");
          card.className = "post-card";

          const head = document.createElement("div");
          head.className = "post-head";

          const title = document.createElement("h2");
          title.className = "post-title";
          const titleLink = document.createElement("a");
          titleLink.href = "./editor.html?id=" + encodeURIComponent(post.id);
          titleLink.textContent = post.title || "Untitled";
          title.appendChild(titleLink);

          const updated = document.createElement("p");
          updated.className = "post-updated";
          updated.textContent = "Updated " + formatDate(post.updatedAt);

          head.appendChild(title);
          head.appendChild(updated);
          card.appendChild(head);

          const excerpt = document.createElement("p");
          excerpt.className = "post-excerpt";
          excerpt.textContent = buildExcerpt(post.content);
          card.appendChild(excerpt);

          const actions = document.createElement("div");
          actions.className = "post-actions";

          const editLink = document.createElement("a");
          editLink.className = "btn";
          editLink.href = "./editor.html?id=" + encodeURIComponent(post.id);
          editLink.textContent = "Edit";

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "btn btn-danger";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", () => onDelete(post.id));

          actions.appendChild(editLink);
          actions.appendChild(deleteBtn);
          card.appendChild(actions);

          frag.appendChild(card);
        });

        listEl.appendChild(frag);
      }

      function onDelete(id) {
        if (!window.confirm("Delete this note?")) return;
        postStore.deletePost(id);
        render();
      }

      function showSavedStatusIfNeeded() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("saved") !== "1") return;
        savedStatusEl.hidden = false;
        window.history.replaceState({}, "", "./index.html");
      }

      function buildExcerpt(content) {
        const plain = String(content || "")
          .replace(/```[\s\S]*?```/g, " [code block] ")
          .replace(/`([^`]+)`/g, "$1")
          .replace(/[#>*_-]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        return plain ? plain.slice(0, 180) + (plain.length > 180 ? "..." : "") : "No content yet.";
      }

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Unknown";
        return date.toLocaleString();
      }
    })();
  </script>
</body>
</html>
