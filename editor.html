<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SugarAbsinthe - Note Editor</title>
  <meta name="description" content="Visual block editor with right-side insert tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <style>
    :root {
      --bg: #f8f8ff;
      --bg-soft: #f2f7ff;
      --text: #181a2a;
      --muted: #5a607f;
      --line: #d8ddf2;
      --line-strong: #bec8ee;
      --primary: #6c4dff;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(49, 58, 118, 0.12);
      --max-width: 1420px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(42rem 24rem at -10% -10%, rgba(113, 132, 255, 0.2), transparent 62%),
        radial-gradient(30rem 18rem at 110% -8%, rgba(13, 160, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-soft) 100%);
    }

    .page {
      width: min(var(--max-width), 95vw);
      margin: 0 auto;
      padding: 1.35rem 0 2.6rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.95rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(72, 87, 164, 0.1);
      padding: 0.56rem 0.72rem;
      flex-wrap: wrap;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.62rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary) 0%, #5f8bff 100%);
      box-shadow: 0 8px 14px rgba(108, 77, 255, 0.25);
      display: inline-block;
    }

    .brand-text {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .back-link {
      text-decoration: none;
      color: var(--muted);
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.46rem 0.8rem;
    }

    .back-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: #fff;
    }

    .mode-badge {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      padding: 0.44rem 0.76rem;
    }

    .editor-shell {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 1.2rem;
    }

    .heading {
      margin: 0;
      font-size: clamp(1.9rem, 3.6vw, 2.6rem);
      line-height: 1.04;
      letter-spacing: -0.01em;
    }

    .sub {
      margin: 0.46rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.62;
    }

    .title-row {
      margin-top: 0.96rem;
      display: grid;
      gap: 0.34rem;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title-input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 1.24rem;
      font-weight: 700;
      padding: 0.7rem 0.82rem;
    }

    .workspace {
      margin-top: 0.95rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 0.72rem;
      align-items: start;
    }

    .body-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fbfcff;
      min-height: 78vh;
      padding: 0.72rem;
      display: grid;
      align-content: start;
      gap: 0.4rem;
    }

    .blocks-area {
      display: grid;
      gap: 0.58rem;
      align-content: start;
      min-height: 70vh;
    }

    .empty-canvas {
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      padding: 1rem 0.9rem;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .doc-block {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 0.62rem;
      display: grid;
      gap: 0.52rem;
      box-shadow: 0 8px 20px rgba(49, 58, 118, 0.08);
    }

    .doc-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .block-tag {
      border-radius: 999px;
      padding: 0.22rem 0.52rem;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #354070;
      background: #eef2ff;
      border: 1px solid #d6defe;
    }

    .block-actions {
      display: flex;
      gap: 0.32rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .icon-btn {
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      color: #465083;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.22rem 0.5rem;
      cursor: pointer;
      line-height: 1.3;
    }

    .icon-btn:hover {
      border-color: #9fafe6;
      background: #f6f8ff;
    }

    .icon-btn.danger {
      border-color: #efb1c4;
      color: #c13c64;
      background: #fff5f8;
    }

    .block-body {
      display: grid;
      gap: 0.46rem;
    }

    .field-input,
    .field-textarea,
    .field-select {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .field-input {
      padding: 0.56rem 0.64rem;
      font-size: 0.96rem;
      font-weight: 600;
    }

    .field-select {
      padding: 0.42rem 0.5rem;
      font-size: 0.92rem;
      font-weight: 700;
      width: auto;
      min-width: 92px;
    }

    .field-textarea {
      resize: none;
      overflow: hidden;
      padding: 0.62rem 0.68rem;
      font-size: 0.96rem;
      line-height: 1.65;
      min-height: 94px;
    }

    .heading-row {
      display: flex;
      gap: 0.42rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .doc-block-heading {
      border-left: 4px solid #96a9ff;
    }

    .doc-block-quote {
      background: linear-gradient(90deg, #f9fbff 0%, #ffffff 45%);
      border-left: 4px solid #8ab3ff;
    }

    .doc-block-quote .field-textarea {
      font-style: italic;
    }

    .doc-block-code {
      border-left: 4px solid #7c68e8;
      background: linear-gradient(120deg, #fcfbff 0%, #ffffff 58%);
    }

    .doc-block-code .field-textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #12182b;
      border-color: #293760;
      color: #e8efff;
      min-height: 150px;
    }

    .doc-block-code .field-input {
      max-width: 240px;
    }

    .code-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .code-hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .code-editor-shell {
      position: relative;
      border: 1px solid #293760;
      border-radius: 10px;
      background: #0c1427;
      overflow: hidden;
      min-height: 180px;
    }

    .code-highlight {
      margin: 0;
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: auto;
      padding: 0.64rem 0.72rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95rem;
      line-height: 1.65;
      white-space: pre;
      color: #e8efff;
    }

    .code-highlight code {
      display: block;
      min-height: 100%;
    }

    .code-highlight .hljs {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    .code-input-layer {
      position: relative;
      z-index: 1;
      border: none;
      border-radius: 0;
      background: transparent;
      color: transparent;
      caret-color: #f8fbff;
      padding: 0.64rem 0.72rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95rem;
      line-height: 1.65;
      min-height: 180px;
      resize: vertical;
      overflow: auto;
      white-space: pre;
    }

    .code-input-layer::selection {
      background: rgba(132, 167, 255, 0.35);
    }

    .doc-block-table {
      border-left: 4px solid #4db8a4;
      background: linear-gradient(120deg, #f6fffb 0%, #ffffff 62%);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .table-grid {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
    }

    .table-grid td {
      border: 1px solid #dfe6f7;
      padding: 0;
    }

    .table-cell {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      color: var(--text);
      font-size: 0.88rem;
      padding: 0.44rem 0.52rem;
    }

    .table-grid tr:first-child .table-cell {
      background: #f5fbff;
      font-weight: 700;
    }

    .table-actions {
      display: flex;
      gap: 0.34rem;
      flex-wrap: wrap;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .toolbar {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 0.7rem;
      display: grid;
      gap: 0.5rem;
      position: sticky;
      top: 0.9rem;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.2;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.5;
    }

    .tool-btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #f8f9ff;
      color: #3d4671;
      font-size: 0.84rem;
      font-weight: 700;
      text-align: left;
      padding: 0.52rem 0.58rem;
      cursor: pointer;
    }

    .tool-btn:hover {
      border-color: #9fafe6;
      background: #f1f4ff;
    }

    .actions {
      margin-top: 0.9rem;
      display: flex;
      gap: 0.44rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.54rem 0.82rem;
      cursor: pointer;
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(120deg, var(--primary) 0%, #5f8bff 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(108, 77, 255, 0.22);
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    .status.error { color: #b42e51; }
    .status.success { color: #2f7a4e; }

    .title-input:focus-visible,
    .field-input:focus-visible,
    .field-textarea:focus-visible,
    .field-select:focus-visible,
    .table-cell:focus-visible,
    .btn:focus-visible,
    .tool-btn:focus-visible,
    .icon-btn:focus-visible,
    .back-link:focus-visible,
    .brand:focus-visible {
      outline: 3px solid rgba(13, 160, 255, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .toolbar {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 16px;
      }

      .editor-shell {
        padding: 0.95rem;
      }

      .body-panel {
        min-height: 70vh;
      }

      .blocks-area {
        min-height: 58vh;
      }

      .table-grid {
        min-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">SugarAbsinthe</span>
      </a>
      <a class="back-link" href="./index.html">Back To Notes</a>
      <div id="mode-badge" class="mode-badge">New Note</div>
    </header>

    <main class="editor-shell">
      <h1 class="heading">Editor</h1>
      <p class="sub">Use visual blocks like document software. Insert from the right and edit each block directly.</p>

      <div class="title-row">
        <label class="label" for="title-input">Title</label>
        <input id="title-input" class="title-input" type="text" maxlength="200" placeholder="Write your note title..." required>
      </div>

      <div class="workspace">
        <section class="body-panel">
          <p class="hint">Click inside any block, then use the right toolbar to insert the next block below it.</p>
          <div id="blocks-area" class="blocks-area"></div>
        </section>

        <aside class="toolbar">
          <h2>Components</h2>
          <p>Insert a visual component as an independent block.</p>
          <button class="tool-btn" type="button" data-add-type="paragraph">+ Paragraph</button>
          <button class="tool-btn" type="button" data-add-type="heading">+ Heading</button>
          <button class="tool-btn" type="button" data-add-type="quote">+ Quote</button>
          <button class="tool-btn" type="button" data-add-type="code">+ Code Block</button>
          <button class="tool-btn" type="button" data-add-type="table">+ Table</button>
        </aside>
      </div>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary" type="button">Save And Return</button>
        <a class="btn" href="./index.html">Cancel</a>
        <p id="status" class="status"></p>
      </div>
    </main>
  </div>

  <script src="./posts-store.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    (() => {
      const titleInput = document.getElementById("title-input");
      const blocksArea = document.getElementById("blocks-area");
      const saveBtn = document.getElementById("save-btn");
      const statusEl = document.getElementById("status");
      const modeBadgeEl = document.getElementById("mode-badge");
      const addButtons = Array.from(document.querySelectorAll("[data-add-type]"));

      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id") || "";
      let existingPost = null;
      let blocks = [];
      let activeBlockId = "";

      init();

      function init() {
        if (postId) {
          existingPost = postStore.getPostById(postId);
        }

        if (existingPost) {
          modeBadgeEl.textContent = "Edit Note";
          titleInput.value = existingPost.title;
          blocks = restoreBlocks(existingPost);
        } else {
          modeBadgeEl.textContent = "New Note";
          blocks = [createBlock("paragraph")];
        }

        renderBlocks();

        addButtons.forEach((btn) => {
          btn.addEventListener("click", () => addBlock(btn.dataset.addType || "paragraph"));
        });

        blocksArea.addEventListener("click", onBlockActionClick);
        saveBtn.addEventListener("click", onSave);
        window.addEventListener("keydown", onKeydown);
      }

      function restoreBlocks(post) {
        if (Array.isArray(post.blocks) && post.blocks.length) {
          const fromBlocks = post.blocks.map((item) => storedToEditorBlock(item)).filter(Boolean);
          if (fromBlocks.length) return fromBlocks;
        }

        if (typeof post.content === "string" && post.content.trim()) {
          return [createBlock("paragraph", { text: post.content })];
        }

        return [createBlock("paragraph")];
      }

      function createBlock(type, seed) {
        const blockId = createId();
        if (type === "paragraph") return { id: blockId, type, text: String((seed && seed.text) || "") };
        if (type === "heading") return { id: blockId, type, level: normalizeHeadingLevel(seed && seed.level), text: String((seed && seed.text) || "") };
        if (type === "quote") return { id: blockId, type, text: String((seed && seed.text) || "") };
        if (type === "code") {
          return {
            id: blockId,
            type,
            lang: "cpp",
            code: String((seed && seed.code) || ""),
            langManual: true,
            detectedLang: "cpp",
            height: normalizeCodeHeight(seed && seed.height)
          };
        }
        if (type === "table") return { id: blockId, type, cells: normalizeTableCells(seed && seed.cells) };
        return { id: blockId, type: "paragraph", text: "" };
      }

      function addBlock(type) {
        const newBlock = createBlock(type);
        const activeIndex = blocks.findIndex((item) => item.id === activeBlockId);
        const insertAt = activeIndex >= 0 ? activeIndex + 1 : blocks.length;
        blocks.splice(insertAt, 0, newBlock);
        activeBlockId = newBlock.id;
        renderBlocks();
        focusBlock(newBlock.id);
      }

      function onBlockActionClick(event) {
        const button = event.target.closest("[data-action]");
        if (!button) return;

        const card = button.closest("[data-block-id]");
        if (!card) return;

        const blockId = card.dataset.blockId;
        const action = button.dataset.action || "";
        const blockIndex = blocks.findIndex((item) => item.id === blockId);
        if (blockIndex < 0) return;

        if (action === "up" && blockIndex > 0) {
          swapBlocks(blockIndex, blockIndex - 1);
          activeBlockId = blockId;
          renderBlocks();
          focusBlock(blockId);
          return;
        }

        if (action === "down" && blockIndex < blocks.length - 1) {
          swapBlocks(blockIndex, blockIndex + 1);
          activeBlockId = blockId;
          renderBlocks();
          focusBlock(blockId);
          return;
        }

        if (action === "delete") {
          blocks.splice(blockIndex, 1);
          if (!blocks.length) {
            blocks = [createBlock("paragraph")];
          }
          const nextIndex = Math.min(blockIndex, blocks.length - 1);
          activeBlockId = blocks[nextIndex].id;
          renderBlocks();
          focusBlock(activeBlockId);
          return;
        }

        if (action === "table-add-row") {
          const block = blocks[blockIndex];
          const cols = tableColumnCount(block.cells);
          block.cells.push(new Array(cols).fill(""));
          activeBlockId = block.id;
          renderBlocks();
          focusBlock(block.id);
          return;
        }

        if (action === "table-add-col") {
          const block = blocks[blockIndex];
          block.cells.forEach((row) => row.push(""));
          activeBlockId = block.id;
          renderBlocks();
          focusBlock(block.id);
          return;
        }

        if (action === "table-del-row") {
          const block = blocks[blockIndex];
          if (block.cells.length > 2) {
            block.cells.pop();
            activeBlockId = block.id;
            renderBlocks();
            focusBlock(block.id);
          }
          return;
        }

        if (action === "table-del-col") {
          const block = blocks[blockIndex];
          if (tableColumnCount(block.cells) > 1) {
            block.cells.forEach((row) => row.pop());
            activeBlockId = block.id;
            renderBlocks();
            focusBlock(block.id);
          }
        }
      }

      function swapBlocks(a, b) {
        const temp = blocks[a];
        blocks[a] = blocks[b];
        blocks[b] = temp;
      }

      function renderBlocks() {
        blocksArea.innerHTML = "";

        if (!blocks.length) {
          const empty = document.createElement("div");
          empty.className = "empty-canvas";
          empty.textContent = "No blocks yet. Use the right toolbar to insert your first component.";
          blocksArea.appendChild(empty);
          return;
        }

        const frag = document.createDocumentFragment();
        blocks.forEach((block, index) => {
          const card = document.createElement("article");
          card.className = "doc-block doc-block-" + block.type;
          card.dataset.blockId = block.id;

          const header = document.createElement("div");
          header.className = "doc-block-header";

          const tag = document.createElement("span");
          tag.className = "block-tag";
          tag.textContent = blockLabel(block.type);

          const actions = document.createElement("div");
          actions.className = "block-actions";

          const upBtn = document.createElement("button");
          upBtn.type = "button";
          upBtn.className = "icon-btn";
          upBtn.dataset.action = "up";
          upBtn.textContent = "Up";
          if (index === 0) upBtn.disabled = true;

          const downBtn = document.createElement("button");
          downBtn.type = "button";
          downBtn.className = "icon-btn";
          downBtn.dataset.action = "down";
          downBtn.textContent = "Down";
          if (index === blocks.length - 1) downBtn.disabled = true;

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "icon-btn danger";
          delBtn.dataset.action = "delete";
          delBtn.textContent = "Delete";

          actions.appendChild(upBtn);
          actions.appendChild(downBtn);
          actions.appendChild(delBtn);
          header.appendChild(tag);
          header.appendChild(actions);

          const body = createBlockBody(block);
          card.appendChild(header);
          card.appendChild(body);
          frag.appendChild(card);
        });

        blocksArea.appendChild(frag);
      }

      function createBlockBody(block) {
        const wrap = document.createElement("div");
        wrap.className = "block-body";

        if (block.type === "paragraph") {
          const textarea = createTextarea(block.text, "Write paragraph...");
          textarea.addEventListener("input", () => {
            block.text = textarea.value;
          });
          wrap.appendChild(textarea);
          return wrap;
        }

        if (block.type === "heading") {
          const row = document.createElement("div");
          row.className = "heading-row";

          const levelSelect = document.createElement("select");
          levelSelect.className = "field-select";
          levelSelect.innerHTML = "<option value='1'>H1</option><option value='2'>H2</option><option value='3'>H3</option>";
          levelSelect.value = String(normalizeHeadingLevel(block.level));
          levelSelect.addEventListener("focus", () => {
            activeBlockId = block.id;
          });
          levelSelect.addEventListener("change", () => {
            block.level = normalizeHeadingLevel(levelSelect.value);
          });

          const input = document.createElement("input");
          input.type = "text";
          input.className = "field-input";
          input.placeholder = "Heading text...";
          input.value = block.text || "";
          input.dataset.focusTarget = "true";
          input.addEventListener("focus", () => {
            activeBlockId = block.id;
          });
          input.addEventListener("input", () => {
            block.text = input.value;
          });

          row.appendChild(levelSelect);
          row.appendChild(input);
          wrap.appendChild(row);
          return wrap;
        }

        if (block.type === "quote") {
          const textarea = createTextarea(block.text, "Quote...");
          textarea.addEventListener("input", () => {
            block.text = textarea.value;
          });
          wrap.appendChild(textarea);
          return wrap;
        }

        if (block.type === "code") {
          const top = document.createElement("div");
          top.className = "code-top";

          const langInput = document.createElement("input");
          langInput.type = "text";
          langInput.className = "field-input";
          langInput.value = "C++";
          langInput.readOnly = true;
          langInput.title = "Code blocks are fixed to C++";
          langInput.addEventListener("focus", () => {
            activeBlockId = block.id;
          });

          const hint = document.createElement("p");
          hint.className = "code-hint";
          hint.textContent = "Language fixed: C++ with syntax highlighting.";

          top.appendChild(langInput);
          top.appendChild(hint);

          const codeArea = createTextarea(block.code, "Write code here...");
          codeArea.classList.add("code-input-layer");
          codeArea.dataset.keepHeight = "true";
          codeArea.spellcheck = false;
          codeArea.style.minHeight = "180px";
          codeArea.style.height = normalizeCodeHeight(block.height) + "px";
          codeArea.dataset.focusTarget = "true";

          const codeShell = document.createElement("div");
          codeShell.className = "code-editor-shell";

          const codeHighlight = document.createElement("pre");
          codeHighlight.className = "code-highlight";
          const codePreview = document.createElement("code");
          codeHighlight.appendChild(codePreview);

          codeShell.appendChild(codeHighlight);
          codeShell.appendChild(codeArea);

          function syncCodeScroll() {
            codeHighlight.scrollTop = codeArea.scrollTop;
            codeHighlight.scrollLeft = codeArea.scrollLeft;
          }

          function renderCodePreview() {
            const codeText = codeArea.value || "";
            const highlighted = highlightCode(codeText);
            codePreview.innerHTML = highlighted.html || "<span></span>";

            block.code = codeText;
            block.lang = "cpp";
            block.langManual = true;
            block.detectedLang = "cpp";
            langInput.value = "C++";

            block.height = normalizeCodeHeight(codeArea.offsetHeight);
            hint.textContent = "Language: cpp (fixed) - Drag corner to resize";
            syncCodeScroll();
          }

          codeArea.addEventListener("input", () => {
            renderCodePreview();
          });
          codeArea.addEventListener("scroll", syncCodeScroll);
          codeArea.addEventListener("mouseup", () => {
            block.height = normalizeCodeHeight(codeArea.offsetHeight);
            syncCodeScroll();
          });

          wrap.appendChild(top);
          wrap.appendChild(codeShell);
          renderCodePreview();
          return wrap;
        }

        if (block.type === "table") {
          const tableWrap = document.createElement("div");
          tableWrap.className = "table-wrap";

          const table = document.createElement("table");
          table.className = "table-grid";
          const tbody = document.createElement("tbody");

          const cells = normalizeTableCells(block.cells);
          block.cells = cells;

          cells.forEach((row, rowIndex) => {
            const tr = document.createElement("tr");
            row.forEach((value, colIndex) => {
              const td = document.createElement("td");
              const input = document.createElement("input");
              input.type = "text";
              input.className = "table-cell";
              input.value = value;
              input.placeholder = rowIndex === 0 ? "Header" : "Value";
              if (rowIndex === 1 && colIndex === 0) {
                input.dataset.focusTarget = "true";
              }
              input.addEventListener("focus", () => {
                activeBlockId = block.id;
              });
              input.addEventListener("input", () => {
                block.cells[rowIndex][colIndex] = input.value;
              });
              td.appendChild(input);
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          tableWrap.appendChild(table);

          const actions = document.createElement("div");
          actions.className = "table-actions";
          actions.innerHTML = [
            "<button class='icon-btn' type='button' data-action='table-add-row'>+ Row</button>",
            "<button class='icon-btn' type='button' data-action='table-add-col'>+ Column</button>",
            "<button class='icon-btn' type='button' data-action='table-del-row'>- Row</button>",
            "<button class='icon-btn' type='button' data-action='table-del-col'>- Column</button>"
          ].join("");

          wrap.appendChild(tableWrap);
          wrap.appendChild(actions);
          return wrap;
        }

        const fallback = createTextarea("", "Unsupported block...");
        wrap.appendChild(fallback);
        return wrap;
      }

      function createTextarea(value, placeholder) {
        const textarea = document.createElement("textarea");
        textarea.className = "field-textarea";
        textarea.placeholder = placeholder;
        textarea.value = value || "";
        textarea.dataset.focusTarget = "true";
        textarea.addEventListener("focus", () => {
          const card = textarea.closest("[data-block-id]");
          if (card) activeBlockId = card.dataset.blockId;
        });
        textarea.addEventListener("input", () => {
          autoGrowTextarea(textarea);
        });
        autoGrowTextarea(textarea);
        return textarea;
      }

      function autoGrowTextarea(textarea) {
        const currentHeight = textarea.offsetHeight || 0;
        textarea.style.height = "auto";
        const minHeight = Number.parseInt(textarea.style.minHeight || "96", 10) || 96;
        const keepHeight = textarea.dataset.keepHeight === "true";
        const next = keepHeight
          ? Math.max(minHeight, textarea.scrollHeight, currentHeight)
          : Math.max(minHeight, textarea.scrollHeight);
        textarea.style.height = next + "px";
      }

      function focusBlock(blockId) {
        window.setTimeout(() => {
          const target = blocksArea.querySelector("[data-block-id='" + blockId + "'] [data-focus-target='true']");
          if (!target) return;
          target.focus();
          if (target.select && target.tagName === "INPUT") target.select();
        }, 0);
      }

      function storedToEditorBlock(block) {
        if (!block || typeof block !== "object") return null;
        if (block.type === "paragraph") return createBlock("paragraph", { text: block.text });
        if (block.type === "heading") return createBlock("heading", { text: block.text, level: block.level });
        if (block.type === "quote") return createBlock("quote", { text: block.text });
        if (block.type === "code") return createBlock("code", { lang: block.lang, code: block.code });
        if (block.type === "table") return createBlock("table", { cells: markdownTableToCells(block.rows) });
        return null;
      }

      function onSave() {
        const title = titleInput.value.trim();

        if (!title) {
          setStatus("Title is required.", "error");
          titleInput.focus();
          return;
        }

        const storedBlocks = blocks.map((item) => editorToStoredBlock(item)).filter(Boolean);
        if (!storedBlocks.length) {
          setStatus("Add at least one non-empty block.", "error");
          return;
        }

        const content = blocksToMarkdown(storedBlocks);
        postStore.upsertPost({
          id: existingPost ? existingPost.id : undefined,
          title: title,
          content: content,
          blocks: storedBlocks,
          createdAt: existingPost ? existingPost.createdAt : undefined
        });

        setStatus("Saved. Returning to notes...", "success");
        window.setTimeout(() => {
          window.location.href = "./index.html?saved=1";
        }, 220);
      }

      function onKeydown(event) {
        const isSave = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s";
        if (!isSave) return;
        event.preventDefault();
        onSave();
      }

      function editorToStoredBlock(block) {
        if (!block || typeof block !== "object") return null;

        if (block.type === "paragraph") {
          const text = String(block.text || "").trim();
          if (!text) return null;
          return { type: "paragraph", text: text };
        }

        if (block.type === "heading") {
          const text = String(block.text || "").trim();
          if (!text) return null;
          return { type: "heading", level: normalizeHeadingLevel(block.level), text: text };
        }

        if (block.type === "quote") {
          const text = String(block.text || "").trim();
          if (!text) return null;
          return { type: "quote", text: text };
        }

        if (block.type === "code") {
          const code = String(block.code || "");
          const lang = String(block.lang || "").trim();
          if (!code.trim()) return null;
          return { type: "code", lang: lang, code: code };
        }

        if (block.type === "table") {
          const cells = normalizeTableCells(block.cells);
          if (!tableHasContent(cells)) return null;
          return { type: "table", rows: cellsToMarkdownTable(cells) };
        }

        return null;
      }

      function blocksToMarkdown(storedBlocks) {
        return storedBlocks
          .map((block) => blockToMarkdown(block))
          .filter((text) => text.trim().length > 0)
          .join("\n\n");
      }

      function blockToMarkdown(block) {
        const type = block && block.type;
        if (type === "paragraph") return String(block.text || "").trim();
        if (type === "heading") {
          const text = String(block.text || "").trim();
          const level = normalizeHeadingLevel(block.level);
          return text ? "#".repeat(level) + " " + text : "";
        }
        if (type === "quote") {
          const text = String(block.text || "").trim();
          return text ? text.split("\n").map((line) => "> " + line).join("\n") : "";
        }
        if (type === "code") {
          const code = String(block.code || "");
          const lang = String(block.lang || "").trim();
          return code.trim() ? "```" + lang + "\n" + code + "\n```" : "";
        }
        if (type === "table") {
          return String(block.rows || "").trim();
        }
        return "";
      }

      function blockLabel(type) {
        if (type === "paragraph") return "Paragraph";
        if (type === "heading") return "Heading";
        if (type === "quote") return "Quote";
        if (type === "code") return "Code";
        if (type === "table") return "Table";
        return "Block";
      }

      function highlightCode(code) {
        const raw = String(code || "");
        if (!raw) {
          return {
            html: "",
            language: "cpp"
          };
        }

        const selected = "cpp";
        const hljs = window.hljs;
        if (hljs && typeof hljs.highlight === "function") {
          if (hljs.getLanguage(selected)) {
            const result = hljs.highlight(raw, { language: selected, ignoreIllegals: true });
            return { html: result.value, language: selected };
          }
        }

        return {
          html: escapeHtml(raw),
          language: selected
        };
      }

      function normalizeCodeHeight(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return 220;
        return Math.max(180, Math.min(1200, Math.round(num)));
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function markdownTableToCells(text) {
        const lines = String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .filter((line) => line);

        if (lines.length < 2) return normalizeTableCells();

        const parsed = lines.map((line) => parseTableRow(line));
        if (!parsed.length) return normalizeTableCells();

        const rows = [];
        rows.push(parsed[0]);

        for (let i = 1; i < parsed.length; i += 1) {
          if (i === 1 && isSeparatorRow(parsed[i])) continue;
          rows.push(parsed[i]);
        }

        return normalizeTableCells(rows);
      }

      function parseTableRow(line) {
        const cleaned = String(line || "").replace(/^\|/, "").replace(/\|$/, "");
        return cleaned.split("|").map((cell) => cell.trim());
      }

      function isSeparatorRow(row) {
        return row.every((cell) => /^:?-{2,}:?$/.test(cell.replace(/\s+/g, "")));
      }

      function cellsToMarkdownTable(cells) {
        const normalized = normalizeTableCells(cells);
        const cols = tableColumnCount(normalized);
        const head = normalized[0];
        const body = normalized.slice(1);
        const divider = new Array(cols).fill("---");

        const lines = [head, divider].concat(body).map((row) => {
          const cellsLine = row.map((cell) => String(cell || "").replace(/\|/g, "\\|"));
          return "| " + cellsLine.join(" | ") + " |";
        });

        return lines.join("\n");
      }

      function normalizeTableCells(cells) {
        if (!Array.isArray(cells) || !cells.length) {
          return [
            ["Column 1", "Column 2"],
            ["", ""]
          ];
        }

        const rows = cells.map((row) => (Array.isArray(row) ? row.map((cell) => String(cell || "")) : []));
        const maxCols = Math.max(2, ...rows.map((row) => row.length || 0));
        const normalized = rows.map((row) => {
          const next = row.slice(0, maxCols);
          while (next.length < maxCols) next.push("");
          return next;
        });

        if (normalized.length < 2) {
          normalized.push(new Array(maxCols).fill(""));
        }

        return normalized;
      }

      function tableColumnCount(cells) {
        if (!Array.isArray(cells) || !cells.length) return 2;
        return Math.max(1, ...cells.map((row) => (Array.isArray(row) ? row.length : 0)));
      }

      function tableHasContent(cells) {
        return cells.some((row) => row.some((cell) => String(cell || "").trim().length > 0));
      }

      function normalizeHeadingLevel(value) {
        const level = Number(value);
        if (level === 1 || level === 2 || level === 3) return level;
        return 2;
      }

      function createId() {
        return "b_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      }

      function setStatus(message, type) {
        statusEl.className = "status";
        if (type === "error") statusEl.classList.add("error");
        if (type === "success") statusEl.classList.add("success");
        statusEl.textContent = message;
      }
    })();
  </script>
</body>
</html>
