<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SugarAbsinthe - Notes</title>
  <meta name="description" content="Simple notes list page with add, delete, and edit workflows.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8ff;
      --bg-soft: #f2f7ff;
      --card: #ffffff;
      --text: #181a2a;
      --muted: #5a607f;
      --line: #d8ddf2;
      --line-strong: #bec8ee;
      --primary: #6c4dff;
      --danger: #d03c62;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(49, 58, 118, 0.12);
      --max-width: 1220px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(42rem 24rem at -10% -10%, rgba(113, 132, 255, 0.2), transparent 62%),
        radial-gradient(30rem 18rem at 110% -8%, rgba(13, 160, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-soft) 100%);
    }

    .page {
      width: min(var(--max-width), 94vw);
      margin: 0 auto;
      padding: 1.45rem 0 2.9rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 24px rgba(72, 87, 164, 0.1);
      padding: 0.6rem 0.75rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary) 0%, #5f8bff 100%);
      box-shadow: 0 8px 14px rgba(108, 77, 255, 0.25);
      display: inline-block;
    }

    .brand-text {
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      font-size: 1.22rem;
      font-weight: 800;
    }

    .primary-link {
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--primary) 0%, #5f8bff 100%);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      padding: 0.58rem 0.94rem;
      box-shadow: 0 8px 16px rgba(108, 77, 255, 0.22);
    }

    .hero {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(125deg, #ffffff 0%, #f7f7ff 62%, #f1f7ff 100%);
      box-shadow: var(--shadow);
      padding: 1.62rem 1.55rem;
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: 1.12rem;
      align-items: stretch;
    }

    .hero-kicker {
      margin: 0;
      color: var(--primary);
      font-size: 0.84rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .hero-dog {
      margin: 0.24rem 0 0;
      display: block;
      width: min(100%, 400px);
      height: auto;
      object-fit: contain;
      object-position: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(38, 48, 111, 0.12);
    }

    .hero p {
      margin: 0.72rem 0 0;
      color: var(--muted);
      line-height: 1.66;
      max-width: 62ch;
      font-size: 1rem;
    }

    .count-badge {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      padding: 0.48rem 0.78rem;
      display: inline-block;
      margin-top: 0.82rem;
    }

    .hero-profile {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 1rem;
      display: grid;
      align-content: start;
      gap: 0.6rem;
    }

    .profile-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .hero-profile h2 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: 0.01em;
    }

    .hero-profile p {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.62;
    }

    .profile-list {
      margin: 0.1rem 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0.36rem;
    }

    .profile-list li {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fdfdff;
      padding: 0.42rem 0.58rem;
      color: #3b4368;
      font-size: 0.86rem;
      font-weight: 600;
    }

    .mini-btn {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: #3d4671;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.3rem 0.62rem;
      cursor: pointer;
    }

    .mini-btn:hover {
      border-color: #9fafe6;
      background: #f6f8ff;
    }

    .profile-editor {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 0.58rem;
      display: grid;
      gap: 0.48rem;
    }

    .profile-field {
      display: grid;
      gap: 0.2rem;
    }

    .profile-field label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .profile-input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.52rem;
    }

    .profile-actions {
      display: flex;
      gap: 0.34rem;
      flex-wrap: wrap;
    }

    .undo-toast {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      border: 1px solid #c8d2ff;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 14px 28px rgba(49, 58, 118, 0.18);
      padding: 0.55rem 0.68rem;
      display: flex;
      align-items: center;
      gap: 0.42rem;
      z-index: 20;
      max-width: min(92vw, 420px);
      flex-wrap: wrap;
    }

    .undo-text {
      margin: 0;
      color: #2f375c;
      font-size: 0.86rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .undo-time {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .status {
      margin-top: 0.75rem;
      border: 1px solid #cce4d8;
      background: #f3fff8;
      color: #2f7a4e;
      border-radius: 11px;
      padding: 0.6rem 0.72rem;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .posts {
      margin-top: 1rem;
      display: grid;
      gap: 0.72rem;
    }

    .post-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 0.92rem 1rem;
      display: grid;
      gap: 0.62rem;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      gap: 0.45rem;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .post-title {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.34;
      letter-spacing: 0.01em;
    }

    .post-title a {
      color: inherit;
      text-decoration: none;
    }

    .post-title a:hover {
      text-decoration: underline;
    }

    .post-updated {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .post-excerpt {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.62;
      white-space: pre-wrap;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.48rem 0.74rem;
      cursor: pointer;
    }

    .btn:hover {
      border-color: #9fafe6;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #efb1c4;
      background: #fff5f8;
    }

    .empty {
      margin-top: 1rem;
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      background: #fff;
      padding: 1.16rem;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.64;
    }

    .footer {
      margin-top: 1.1rem;
      border-top: 1px solid var(--line);
      padding-top: 0.86rem;
      color: var(--muted);
      font-size: 0.88rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .primary-link:focus-visible,
    .btn:focus-visible,
    .mini-btn:focus-visible,
    .profile-input:focus-visible {
      outline: 3px solid rgba(13, 160, 255, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 16px;
      }

      .hero {
        padding: 0.95rem;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">SugarAbsinthe</span>
      </a>
      <a class="primary-link" href="./editor.html">+ Add Note</a>
    </header>

    <section class="hero">
      <div>
        <img class="hero-dog" src="./dog.jpg" alt="dog">
        <p>Live like summer flowers.</p>
        <div class="count-badge">Total Notes: <span id="post-count">0</span></div>
      </div>
      <aside class="hero-profile">
        <div class="profile-head">
          <h2>About Me</h2>
          <button id="profile-edit-btn" class="mini-btn" type="button">Edit</button>
        </div>
        <ul id="profile-list" class="profile-list"></ul>
        <div id="profile-editor" class="profile-editor" hidden>
          <div class="profile-field">
            <label for="profile-input-1">Line 1</label>
            <input id="profile-input-1" class="profile-input" type="text" maxlength="120" placeholder="Focus...">
          </div>
          <div class="profile-field">
            <label for="profile-input-2">Line 2</label>
            <input id="profile-input-2" class="profile-input" type="text" maxlength="120" placeholder="Current goal...">
          </div>
          <div class="profile-field">
            <label for="profile-input-3">Line 3</label>
            <input id="profile-input-3" class="profile-input" type="text" maxlength="120" placeholder="Format...">
          </div>
          <div class="profile-actions">
            <button id="profile-save-btn" class="mini-btn" type="button">Save</button>
            <button id="profile-cancel-btn" class="mini-btn" type="button">Cancel</button>
          </div>
        </div>
      </aside>
    </section>

    <div id="undo-toast" class="undo-toast" hidden>
      <p class="undo-text">Note deleted.</p>
      <button id="undo-btn" class="mini-btn" type="button">Undo</button>
      <span id="undo-time" class="undo-time">5s</span>
    </div>

    <div id="saved-status" class="status" hidden>Note saved successfully.</div>

    <main>
      <div id="posts-list" class="posts" hidden></div>
      <div id="empty-state" class="empty" hidden>
        No notes yet. Click <strong>Add Note</strong> to create your first entry.
      </div>
    </main>

    <footer class="footer">
      <span>&copy; 2026 SugarAbsinthe</span>
      <span><a href="./editor.html">Open Editor</a></span>
    </footer>
  </div>

  <script src="./posts-store.js"></script>
  <script>
    (() => {
      const PROFILE_STORAGE_KEY = "sugar_profile_v1";
      const PROFILE_DEFAULT_LINES = [
        "Focus: mobile / frontend / dev tools",
        "Current goal: publish notes every week",
        "Format: markdown + practical code snippets"
      ];
      const UNDO_WINDOW_MS = 5000;

      const listEl = document.getElementById("posts-list");
      const emptyEl = document.getElementById("empty-state");
      const countEl = document.getElementById("post-count");
      const savedStatusEl = document.getElementById("saved-status");
      const undoToastEl = document.getElementById("undo-toast");
      const undoBtnEl = document.getElementById("undo-btn");
      const undoTimeEl = document.getElementById("undo-time");
      const undoTextEl = undoToastEl.querySelector(".undo-text");

      const profileListEl = document.getElementById("profile-list");
      const profileEditBtn = document.getElementById("profile-edit-btn");
      const profileEditorEl = document.getElementById("profile-editor");
      const profileSaveBtn = document.getElementById("profile-save-btn");
      const profileCancelBtn = document.getElementById("profile-cancel-btn");
      const profileInputs = [
        document.getElementById("profile-input-1"),
        document.getElementById("profile-input-2"),
        document.getElementById("profile-input-3")
      ];

      let pendingDelete = null;
      let profileLines = readProfileLines();

      init();

      function init() {
        showSavedStatusIfNeeded();
        bindProfileEvents();
        renderProfile();
        render();
      }

      function render() {
        const posts = postStore.readPosts().sort((a, b) => Number(new Date(b.updatedAt)) - Number(new Date(a.updatedAt)));
        countEl.textContent = String(posts.length);
        listEl.innerHTML = "";

        if (!posts.length) {
          listEl.hidden = true;
          emptyEl.hidden = false;
          return;
        }

        emptyEl.hidden = true;
        listEl.hidden = false;

        const frag = document.createDocumentFragment();
        posts.forEach((post) => {
          const card = document.createElement("article");
          card.className = "post-card";

          const head = document.createElement("div");
          head.className = "post-head";

          const title = document.createElement("h2");
          title.className = "post-title";
          const titleLink = document.createElement("a");
          titleLink.href = "./editor.html?id=" + encodeURIComponent(post.id);
          titleLink.textContent = post.title || "Untitled";
          title.appendChild(titleLink);

          const updated = document.createElement("p");
          updated.className = "post-updated";
          updated.textContent = "Updated " + formatDate(post.updatedAt);

          head.appendChild(title);
          head.appendChild(updated);
          card.appendChild(head);

          const excerpt = document.createElement("p");
          excerpt.className = "post-excerpt";
          excerpt.textContent = buildExcerpt(post.content);
          card.appendChild(excerpt);

          const actions = document.createElement("div");
          actions.className = "post-actions";

          const editLink = document.createElement("a");
          editLink.className = "btn";
          editLink.href = "./editor.html?id=" + encodeURIComponent(post.id);
          editLink.textContent = "Edit";

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "btn btn-danger";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", () => onDelete(post.id));

          actions.appendChild(editLink);
          actions.appendChild(deleteBtn);
          card.appendChild(actions);

          frag.appendChild(card);
        });

        listEl.appendChild(frag);
      }

      function onDelete(id) {
        const post = postStore.getPostById(id);
        if (!post) return;
        if (!window.confirm("Delete this note? You can undo within 5 seconds.")) return;

        finalizePendingDelete();
        postStore.deletePost(id);
        render();
        showUndoToast(post);
      }

      function showUndoToast(post) {
        const removedPost = clonePost(post);
        if (!removedPost) return;

        pendingDelete = {
          post: removedPost,
          expiresAt: Date.now() + UNDO_WINDOW_MS,
          timeoutId: null,
          intervalId: null
        };

        undoTextEl.textContent = "Deleted: " + (removedPost.title || "Untitled");
        undoToastEl.hidden = false;
        updateUndoCountdown();

        pendingDelete.timeoutId = window.setTimeout(() => {
          finalizePendingDelete();
        }, UNDO_WINDOW_MS);
        pendingDelete.intervalId = window.setInterval(updateUndoCountdown, 200);
      }

      function updateUndoCountdown() {
        if (!pendingDelete) return;
        const remainMs = Math.max(0, pendingDelete.expiresAt - Date.now());
        const sec = Math.max(0, Math.ceil(remainMs / 1000));
        undoTimeEl.textContent = sec + "s";
      }

      function onUndoDelete() {
        if (!pendingDelete || !pendingDelete.post) return;

        const posts = postStore.readPosts();
        const exists = posts.some((item) => item.id === pendingDelete.post.id);
        if (!exists) {
          posts.push(pendingDelete.post);
          postStore.writePosts(posts);
        }

        finalizePendingDelete();
        render();
      }

      function finalizePendingDelete() {
        if (!pendingDelete) return;
        if (pendingDelete.timeoutId) window.clearTimeout(pendingDelete.timeoutId);
        if (pendingDelete.intervalId) window.clearInterval(pendingDelete.intervalId);
        pendingDelete = null;
        undoToastEl.hidden = true;
      }

      function clonePost(post) {
        try {
          return JSON.parse(JSON.stringify(post));
        } catch {
          return null;
        }
      }

      function bindProfileEvents() {
        profileEditBtn.addEventListener("click", openProfileEditor);
        profileSaveBtn.addEventListener("click", onProfileSave);
        profileCancelBtn.addEventListener("click", closeProfileEditor);
        undoBtnEl.addEventListener("click", onUndoDelete);
      }

      function openProfileEditor() {
        const lines = profileLines.slice(0, 3);
        while (lines.length < 3) lines.push("");
        profileInputs.forEach((input, index) => {
          input.value = lines[index];
        });
        profileEditorEl.hidden = false;
        profileEditBtn.textContent = "Editing";
        profileEditBtn.disabled = true;
      }

      function closeProfileEditor() {
        profileEditorEl.hidden = true;
        profileEditBtn.textContent = "Edit";
        profileEditBtn.disabled = false;
      }

      function onProfileSave() {
        const next = profileInputs
          .map((input) => String(input.value || "").trim())
          .filter((item) => item);
        profileLines = next.length ? next.slice(0, 3) : PROFILE_DEFAULT_LINES.slice();
        writeProfileLines(profileLines);
        renderProfile();
        closeProfileEditor();
      }

      function renderProfile() {
        profileListEl.innerHTML = "";
        profileLines.forEach((line) => {
          const li = document.createElement("li");
          li.textContent = line;
          profileListEl.appendChild(li);
        });
      }

      function readProfileLines() {
        const raw = window.localStorage.getItem(PROFILE_STORAGE_KEY);
        if (!raw) return PROFILE_DEFAULT_LINES.slice();
        try {
          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.lines)) return PROFILE_DEFAULT_LINES.slice();
          const lines = parsed.lines
            .map((item) => String(item || "").trim().slice(0, 120))
            .filter((item) => item);
          return lines.length ? lines.slice(0, 3) : PROFILE_DEFAULT_LINES.slice();
        } catch {
          return PROFILE_DEFAULT_LINES.slice();
        }
      }

      function writeProfileLines(lines) {
        const payload = {
          lines: Array.isArray(lines) ? lines.slice(0, 3) : PROFILE_DEFAULT_LINES.slice()
        };
        window.localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(payload));
      }

      function showSavedStatusIfNeeded() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("saved") !== "1") return;
        savedStatusEl.hidden = false;
        window.history.replaceState({}, "", "./index.html");
      }

      function buildExcerpt(content) {
        const plain = String(content || "")
          .replace(/```[\s\S]*?```/g, " [code block] ")
          .replace(/`([^`]+)`/g, "$1")
          .replace(/[#>*_-]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        return plain ? plain.slice(0, 180) + (plain.length > 180 ? "..." : "") : "No content yet.";
      }

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Unknown";
        return date.toLocaleString();
      }
    })();
  </script>
</body>
</html>
