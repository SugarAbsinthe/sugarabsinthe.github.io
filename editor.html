<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SugarAbsinthe - Note Editor</title>
  <meta name="description" content="Large body editor with right-side component tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8ff;
      --bg-soft: #f2f7ff;
      --card: #ffffff;
      --text: #181a2a;
      --muted: #5a607f;
      --line: #d8ddf2;
      --line-strong: #bec8ee;
      --primary: #6c4dff;
      --danger: #d03c62;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(49, 58, 118, 0.12);
      --max-width: 1420px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(42rem 24rem at -10% -10%, rgba(113, 132, 255, 0.2), transparent 62%),
        radial-gradient(30rem 18rem at 110% -8%, rgba(13, 160, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-soft) 100%);
    }

    .page {
      width: min(var(--max-width), 95vw);
      margin: 0 auto;
      padding: 1.35rem 0 2.6rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.95rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(72, 87, 164, 0.1);
      padding: 0.56rem 0.72rem;
      flex-wrap: wrap;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.62rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary) 0%, #5f8bff 100%);
      box-shadow: 0 8px 14px rgba(108, 77, 255, 0.25);
      display: inline-block;
    }

    .brand-text {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .back-link {
      text-decoration: none;
      color: var(--muted);
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.46rem 0.8rem;
    }

    .back-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: #fff;
    }

    .mode-badge {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      padding: 0.44rem 0.76rem;
    }

    .editor-shell {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 1.2rem;
    }

    .heading {
      margin: 0;
      font-size: clamp(1.9rem, 3.6vw, 2.6rem);
      line-height: 1.04;
      letter-spacing: -0.01em;
    }

    .sub {
      margin: 0.46rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.62;
    }

    .title-row {
      margin-top: 0.96rem;
      display: grid;
      gap: 0.34rem;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title-input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 1.24rem;
      font-weight: 700;
      padding: 0.7rem 0.82rem;
    }

    .workspace {
      margin-top: 0.95rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 0.72rem;
      align-items: start;
    }

    .body-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fbfcff;
      min-height: 78vh;
      padding: 0.72rem;
      display: grid;
      align-content: start;
      gap: 0.52rem;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 0.58rem;
      display: grid;
      gap: 0.38rem;
    }

    .block.active {
      border-color: #9fafe6;
      box-shadow: 0 0 0 2px rgba(108, 77, 255, 0.1);
    }

    .block-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .block-tag {
      border: 1px solid #d3dcff;
      border-radius: 999px;
      background: #eef2ff;
      color: #3f4ea0;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 0.14rem 0.48rem;
    }

    .block-remove {
      border: 1px solid #efb1c4;
      border-radius: 8px;
      background: #fff5f8;
      color: var(--danger);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.16rem 0.46rem;
      cursor: pointer;
    }

    .field {
      display: grid;
      gap: 0.24rem;
    }

    .field label {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 0.4rem;
      align-items: center;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
      padding: 0.5rem 0.56rem;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.58;
    }

    .field textarea.main-paragraph {
      min-height: 58vh;
      font-size: 0.98rem;
      line-height: 1.68;
    }

    .field textarea.code-input {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86rem;
      min-height: 140px;
      line-height: 1.56;
    }

    .toolbar {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 0.7rem;
      display: grid;
      gap: 0.5rem;
      position: sticky;
      top: 0.9rem;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.2;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.5;
    }

    .tool-btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #f8f9ff;
      color: #3d4671;
      font-size: 0.84rem;
      font-weight: 700;
      text-align: left;
      padding: 0.52rem 0.58rem;
      cursor: pointer;
    }

    .tool-btn:hover {
      border-color: #9fafe6;
      background: #f1f4ff;
    }

    .actions {
      margin-top: 0.9rem;
      display: flex;
      gap: 0.44rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.54rem 0.82rem;
      cursor: pointer;
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(120deg, var(--primary) 0%, #5f8bff 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(108, 77, 255, 0.22);
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    .status.error { color: #b42e51; }
    .status.success { color: #2f7a4e; }

    .title-input:focus-visible,
    .field input:focus-visible,
    .field select:focus-visible,
    .field textarea:focus-visible,
    .btn:focus-visible,
    .tool-btn:focus-visible,
    .block-remove:focus-visible,
    .back-link:focus-visible,
    .brand:focus-visible {
      outline: 3px solid rgba(13, 160, 255, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .toolbar {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 16px;
      }

      .editor-shell {
        padding: 0.95rem;
      }

      .body-panel {
        min-height: 70vh;
      }

      .field textarea.main-paragraph {
        min-height: 46vh;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">SugarAbsinthe</span>
      </a>
      <a class="back-link" href="./index.html">Back To Notes</a>
      <div id="mode-badge" class="mode-badge">New Note</div>
    </header>

    <main class="editor-shell">
      <h1 class="heading">Editor</h1>
      <p class="sub">Keep writing in the large body area. Add components from the right and they appear directly below your current block.</p>

      <div class="title-row">
        <label class="label" for="title-input">Title</label>
        <input id="title-input" class="title-input" type="text" maxlength="200" placeholder="Write your note title..." required>
      </div>

      <div class="workspace">
        <section id="body-panel" class="body-panel">
          <div id="blocks-container"></div>
        </section>

        <aside class="toolbar">
          <h2>Components</h2>
          <p>Click one to insert it below the block you are currently editing.</p>
          <button class="tool-btn" type="button" data-add-type="paragraph">+ Paragraph</button>
          <button class="tool-btn" type="button" data-add-type="heading">+ Heading</button>
          <button class="tool-btn" type="button" data-add-type="quote">+ Quote</button>
          <button class="tool-btn" type="button" data-add-type="code">+ Code Block</button>
          <button class="tool-btn" type="button" data-add-type="table">+ Table</button>
        </aside>
      </div>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary" type="button">Save And Return</button>
        <a class="btn" href="./index.html">Cancel</a>
        <p id="status" class="status"></p>
      </div>
    </main>
  </div>

  <script src="./posts-store.js"></script>
  <script>
    (() => {
      const titleInput = document.getElementById("title-input");
      const blocksContainer = document.getElementById("blocks-container");
      const saveBtn = document.getElementById("save-btn");
      const statusEl = document.getElementById("status");
      const modeBadgeEl = document.getElementById("mode-badge");
      const addButtons = Array.from(document.querySelectorAll("[data-add-type]"));

      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id") || "";
      let existingPost = null;
      const state = { blocks: [], activeBlockId: "" };

      init();

      function init() {
        if (postId) existingPost = postStore.getPostById(postId);

        if (existingPost) {
          modeBadgeEl.textContent = "Edit Note";
          titleInput.value = existingPost.title;
          state.blocks = loadBlocksFromPost(existingPost);
        } else {
          modeBadgeEl.textContent = "New Note";
          state.blocks = [createDefaultBlock("paragraph")];
        }

        state.activeBlockId = state.blocks[0] ? state.blocks[0].id : "";

        addButtons.forEach((btn) => {
          btn.addEventListener("click", () => addBlock(btn.dataset.addType || "paragraph"));
        });

        saveBtn.addEventListener("click", onSave);
        window.addEventListener("keydown", onKeydown);
        renderBlocks();
      }

      function loadBlocksFromPost(post) {
        if (Array.isArray(post.blocks) && post.blocks.length) {
          return sanitizeBlocksForEditor(post.blocks);
        }
        if (typeof post.content === "string" && post.content.trim()) {
          return [{ id: createId(), type: "paragraph", text: post.content.trim() }];
        }
        return [createDefaultBlock("paragraph")];
      }

      function sanitizeBlocksForEditor(blocks) {
        return blocks
          .map((item) => {
            const type = normalizeType(item && item.type);
            if (!type) return null;
            if (type === "paragraph") return { id: createId(), type, text: String(item.text || "") };
            if (type === "heading") return { id: createId(), type, text: String(item.text || ""), level: normalizeHeadingLevel(item.level) };
            if (type === "quote") return { id: createId(), type, text: String(item.text || "") };
            if (type === "code") return { id: createId(), type, lang: String(item.lang || ""), code: String(item.code || "") };
            if (type === "table") return { id: createId(), type, rows: String(item.rows || "") };
            return null;
          })
          .filter(Boolean);
      }

      function sanitizeBlocksForSave(blocks) {
        return blocks
          .map((item) => {
            const type = normalizeType(item && item.type);
            if (!type) return null;
            if (type === "paragraph") return { type, text: String(item.text || "") };
            if (type === "heading") return { type, text: String(item.text || ""), level: normalizeHeadingLevel(item.level) };
            if (type === "quote") return { type, text: String(item.text || "") };
            if (type === "code") return { type, lang: String(item.lang || ""), code: String(item.code || "") };
            if (type === "table") return { type, rows: String(item.rows || "") };
            return null;
          })
          .filter(Boolean);
      }

      function createDefaultBlock(type) {
        const base = { id: createId(), type: normalizeType(type) || "paragraph" };
        if (base.type === "paragraph") return { ...base, text: "" };
        if (base.type === "heading") return { ...base, text: "", level: 2 };
        if (base.type === "quote") return { ...base, text: "" };
        if (base.type === "code") return { ...base, lang: "", code: "" };
        if (base.type === "table") return { ...base, rows: "Column A | Column B\nValue 1 | Value 2" };
        return { ...base, text: "" };
      }

      function addBlock(type) {
        const newBlock = createDefaultBlock(type);
        const insertIndex = getInsertIndexAfterActive();
        const next = state.blocks.slice();
        next.splice(insertIndex, 0, newBlock);
        state.blocks = next;
        state.activeBlockId = newBlock.id;
        renderBlocks();
        focusFirstInput(newBlock.id);
      }

      function getInsertIndexAfterActive() {
        const index = state.blocks.findIndex((item) => item.id === state.activeBlockId);
        if (index < 0) return state.blocks.length;
        return index + 1;
      }

      function removeBlock(id) {
        const index = state.blocks.findIndex((item) => item.id === id);
        if (index < 0) return;

        if (state.blocks.length === 1) {
          state.blocks = [createDefaultBlock("paragraph")];
          state.activeBlockId = state.blocks[0].id;
          renderBlocks();
          focusFirstInput(state.activeBlockId);
          return;
        }

        const next = state.blocks.filter((item) => item.id !== id);
        state.blocks = next;
        const fallback = next[Math.min(index, next.length - 1)];
        state.activeBlockId = fallback ? fallback.id : "";
        renderBlocks();
        if (state.activeBlockId) focusFirstInput(state.activeBlockId);
      }

      function updateBlock(id, patch) {
        state.blocks = state.blocks.map((item) => (item.id === id ? { ...item, ...patch } : item));
      }

      function renderBlocks() {
        blocksContainer.innerHTML = "";
        const frag = document.createDocumentFragment();

        state.blocks.forEach((block, index) => {
          const item = document.createElement("article");
          item.className = "block";
          if (block.id === state.activeBlockId) item.classList.add("active");
          item.dataset.blockId = block.id;
          item.addEventListener("focusin", () => {
            state.activeBlockId = block.id;
            refreshActiveStyles();
          });

          const head = document.createElement("div");
          head.className = "block-head";

          const tag = document.createElement("span");
          tag.className = "block-tag";
          tag.textContent = labelForType(block.type);

          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "block-remove";
          removeBtn.textContent = "Remove";
          removeBtn.addEventListener("click", () => removeBlock(block.id));

          head.appendChild(tag);
          head.appendChild(removeBtn);
          item.appendChild(head);

          renderBlockFields(block, index, item);
          frag.appendChild(item);
        });

        blocksContainer.appendChild(frag);
      }

      function refreshActiveStyles() {
        document.querySelectorAll(".block").forEach((node) => {
          if (node.dataset.blockId === state.activeBlockId) {
            node.classList.add("active");
          } else {
            node.classList.remove("active");
          }
        });
      }

      function renderBlockFields(block, index, container) {
        if (block.type === "paragraph") {
          const textarea = createTextareaField("Text", block.text, (value) => updateBlock(block.id, { text: value }));
          if (index === 0) textarea.classList.add("main-paragraph");
          container.appendChild(wrapField("Text", textarea));
          return;
        }

        if (block.type === "heading") {
          const levelSelect = document.createElement("select");
          [
            { label: "H1", value: "1" },
            { label: "H2", value: "2" },
            { label: "H3", value: "3" }
          ].forEach((item) => {
            const option = document.createElement("option");
            option.value = item.value;
            option.textContent = item.label;
            if (Number(item.value) === normalizeHeadingLevel(block.level)) option.selected = true;
            levelSelect.appendChild(option);
          });
          levelSelect.addEventListener("change", () => updateBlock(block.id, { level: normalizeHeadingLevel(levelSelect.value) }));

          const input = document.createElement("input");
          input.type = "text";
          input.value = block.text || "";
          input.placeholder = "Heading text...";
          input.addEventListener("input", () => updateBlock(block.id, { text: input.value }));

          const row = document.createElement("div");
          row.className = "row";
          row.appendChild(levelSelect);
          row.appendChild(input);
          container.appendChild(wrapField("Heading", row));
          return;
        }

        if (block.type === "quote") {
          const textarea = createTextareaField("Quote", block.text, (value) => updateBlock(block.id, { text: value }));
          autoGrowTextarea(textarea, 110);
          container.appendChild(wrapField("Quote", textarea));
          return;
        }

        if (block.type === "code") {
          const langInput = document.createElement("input");
          langInput.type = "text";
          langInput.value = block.lang || "";
          langInput.placeholder = "Language (optional)";
          langInput.addEventListener("input", () => updateBlock(block.id, { lang: langInput.value }));

          const codeTextarea = createTextareaField("Code", block.code, (value) => {
            updateBlock(block.id, { code: value });
            autoGrowTextarea(codeTextarea, 140);
          });
          codeTextarea.classList.add("code-input");
          autoGrowTextarea(codeTextarea, 140);

          container.appendChild(wrapField("Language", langInput));
          container.appendChild(wrapField("Code", codeTextarea));
          return;
        }

        if (block.type === "table") {
          const tableTextarea = createTextareaField("Rows", block.rows, (value) => {
            updateBlock(block.id, { rows: value });
            autoGrowTextarea(tableTextarea, 120);
          });
          tableTextarea.placeholder = "Column A | Column B\nValue 1 | Value 2";
          autoGrowTextarea(tableTextarea, 120);
          container.appendChild(wrapField("Table (use | between columns)", tableTextarea));
        }
      }

      function wrapField(labelText, inputNode) {
        const field = document.createElement("div");
        field.className = "field";
        const label = document.createElement("label");
        label.textContent = labelText;
        field.appendChild(label);
        field.appendChild(inputNode);
        return field;
      }

      function createTextareaField(labelText, value, onInput) {
        const textarea = document.createElement("textarea");
        textarea.value = value || "";
        textarea.addEventListener("input", () => onInput(textarea.value));
        return textarea;
      }

      function focusFirstInput(blockId) {
        window.requestAnimationFrame(() => {
          const target = document.querySelector('[data-block-id="' + blockId + '"] textarea, [data-block-id="' + blockId + '"] input, [data-block-id="' + blockId + '"] select');
          if (target) target.focus();
        });
      }

      function autoGrowTextarea(textarea, minHeight) {
        const minimum = Number(minHeight) || 100;
        textarea.style.height = "auto";
        textarea.style.height = Math.max(minimum, textarea.scrollHeight) + "px";
      }

      function onSave() {
        const title = titleInput.value.trim();
        if (!title) {
          setStatus("Title is required.", "error");
          titleInput.focus();
          return;
        }

        const blocksForSave = sanitizeBlocksForSave(state.blocks);
        const content = blocksToMarkdown(blocksForSave);

        postStore.upsertPost({
          id: existingPost ? existingPost.id : undefined,
          title,
          content,
          blocks: blocksForSave,
          createdAt: existingPost ? existingPost.createdAt : undefined
        });

        setStatus("Saved. Returning to notes...", "success");
        window.setTimeout(() => {
          window.location.href = "./index.html?saved=1";
        }, 220);
      }

      function onKeydown(event) {
        const isSave = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s";
        if (!isSave) return;
        event.preventDefault();
        onSave();
      }

      function blocksToMarkdown(blocks) {
        return blocks
          .map((block) => blockToMarkdown(block))
          .filter((text) => text.trim().length > 0)
          .join("\n\n");
      }

      function blockToMarkdown(block) {
        if (block.type === "paragraph") return String(block.text || "").trim();
        if (block.type === "heading") {
          const text = String(block.text || "").trim();
          if (!text) return "";
          const level = normalizeHeadingLevel(block.level);
          return "#".repeat(level) + " " + text;
        }
        if (block.type === "quote") {
          const quote = String(block.text || "").trim();
          if (!quote) return "";
          return quote.split("\n").map((line) => "> " + line).join("\n");
        }
        if (block.type === "code") {
          const code = String(block.code || "");
          if (!code.trim()) return "";
          const lang = String(block.lang || "").trim();
          return "```" + lang + "\n" + code + "\n```";
        }
        if (block.type === "table") {
          return tableRowsToMarkdown(String(block.rows || ""));
        }
        return "";
      }

      function tableRowsToMarkdown(rowsText) {
        const rows = rowsText
          .split("\n")
          .map((line) => line.split("|").map((cell) => cell.trim()).filter((cell) => cell.length > 0))
          .filter((cells) => cells.length > 0);

        if (!rows.length) return "";
        const header = rows[0];
        const body = rows.slice(1);
        const separator = header.map(() => "---");
        const lines = [
          "| " + header.join(" | ") + " |",
          "| " + separator.join(" | ") + " |"
        ];
        body.forEach((row) => {
          const normalized = header.map((_, index) => row[index] || "");
          lines.push("| " + normalized.join(" | ") + " |");
        });
        return lines.join("\n");
      }

      function normalizeType(type) {
        const allowed = ["paragraph", "heading", "quote", "code", "table"];
        return allowed.includes(type) ? type : "";
      }

      function normalizeHeadingLevel(value) {
        const level = Number(value);
        if (level === 1 || level === 2 || level === 3) return level;
        return 2;
      }

      function labelForType(type) {
        if (type === "paragraph") return "Paragraph";
        if (type === "heading") return "Heading";
        if (type === "quote") return "Quote";
        if (type === "code") return "Code Block";
        if (type === "table") return "Table";
        return "Block";
      }

      function createId() {
        return "b_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      }

      function setStatus(message, type) {
        statusEl.className = "status";
        if (type === "error") statusEl.classList.add("error");
        if (type === "success") statusEl.classList.add("success");
        statusEl.textContent = message;
      }
    })();
  </script>
</body>
</html>
