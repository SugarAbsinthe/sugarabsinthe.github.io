<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SugarAbsinthe - Note Editor</title>
  <meta name="description" content="Large writing editor for creating and updating notes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,600;6..72,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8ff;
      --bg-soft: #f2f7ff;
      --card: #ffffff;
      --text: #181a2a;
      --muted: #5a607f;
      --line: #d8ddf2;
      --line-strong: #bec8ee;
      --primary: #6c4dff;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 40px rgba(49, 58, 118, 0.12);
      --max-width: 1280px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Outfit", sans-serif;
      color: var(--text);
      background:
        radial-gradient(42rem 24rem at -10% -10%, rgba(113, 132, 255, 0.2), transparent 62%),
        radial-gradient(30rem 18rem at 110% -8%, rgba(13, 160, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-soft) 100%);
    }

    .page {
      width: min(var(--max-width), 94vw);
      margin: 0 auto;
      padding: 1.2rem 0 2.4rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(72, 87, 164, 0.1);
      padding: 0.46rem 0.6rem;
      flex-wrap: wrap;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.45rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-mark {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary) 0%, #5f8bff 100%);
      box-shadow: 0 8px 14px rgba(108, 77, 255, 0.25);
      display: inline-block;
    }

    .brand-text {
      font-family: "Newsreader", serif;
      font-size: 1.14rem;
    }

    .back-link {
      text-decoration: none;
      color: var(--muted);
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.84rem;
      font-weight: 700;
      padding: 0.38rem 0.72rem;
    }

    .back-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: #fff;
    }

    .mode-badge {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.36rem 0.65rem;
    }

    .editor-shell {
      margin-top: 0.9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .heading {
      margin: 0;
      font-family: "Newsreader", serif;
      font-size: clamp(1.6rem, 3.2vw, 2.2rem);
      line-height: 1.06;
      letter-spacing: -0.01em;
    }

    .sub {
      margin: 0.38rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .title-row {
      margin-top: 0.8rem;
      display: grid;
      gap: 0.34rem;
    }

    .label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title-input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 1.14rem;
      font-weight: 700;
      padding: 0.62rem 0.72rem;
    }

    .content-row {
      margin-top: 0.7rem;
      display: grid;
      gap: 0.34rem;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .content-input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: #fbfcff;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.62;
      resize: vertical;
      min-height: 74vh;
      padding: 0.74rem;
    }

    .actions {
      margin-top: 0.72rem;
      display: flex;
      gap: 0.44rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.46rem 0.72rem;
      cursor: pointer;
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(120deg, var(--primary) 0%, #5f8bff 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(108, 77, 255, 0.22);
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    .status.error {
      color: #b42e51;
    }

    .status.success {
      color: #2f7a4e;
    }

    .title-input:focus-visible,
    .content-input:focus-visible,
    .btn:focus-visible,
    .back-link:focus-visible,
    .brand:focus-visible {
      outline: 3px solid rgba(13, 160, 255, 0.35);
      outline-offset: 2px;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        border-radius: 16px;
      }

      .editor-shell {
        padding: 0.85rem;
      }

      .content-input {
        min-height: 64vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">SugarAbsinthe</span>
      </a>
      <a class="back-link" href="./index.html">Back To Notes</a>
      <div id="mode-badge" class="mode-badge">New Note</div>
    </header>

    <main class="editor-shell">
      <h1 class="heading">Editor</h1>
      <p class="sub">Write freely here. This page is intentionally focused on writing only.</p>

      <div class="title-row">
        <label class="label" for="title-input">Title</label>
        <input id="title-input" class="title-input" type="text" maxlength="200" placeholder="Write your note title..." required>
      </div>

      <div class="content-row">
        <label class="label" for="content-input">Body</label>
        <p class="hint">Supports plain text, Markdown, and code blocks like <code>```js</code>.</p>
        <textarea id="content-input" class="content-input" placeholder="# Heading&#10;&#10;Write your content here...&#10;&#10;```js&#10;console.log('Hello');&#10;```"></textarea>
      </div>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary" type="button">Save And Return</button>
        <a class="btn" href="./index.html">Cancel</a>
        <p id="status" class="status"></p>
      </div>
    </main>
  </div>

  <script src="./posts-store.js"></script>
  <script>
    (() => {
      const titleInput = document.getElementById("title-input");
      const contentInput = document.getElementById("content-input");
      const saveBtn = document.getElementById("save-btn");
      const statusEl = document.getElementById("status");
      const modeBadgeEl = document.getElementById("mode-badge");

      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id") || "";
      let existingPost = null;

      init();

      function init() {
        if (postId) {
          existingPost = postStore.getPostById(postId);
        }

        if (existingPost) {
          modeBadgeEl.textContent = "Edit Note";
          titleInput.value = existingPost.title;
          contentInput.value = existingPost.content;
        } else {
          modeBadgeEl.textContent = "New Note";
        }

        saveBtn.addEventListener("click", onSave);
        window.addEventListener("keydown", onKeydown);
      }

      function onSave() {
        const title = titleInput.value.trim();
        const content = contentInput.value;

        if (!title) {
          setStatus("Title is required.", "error");
          titleInput.focus();
          return;
        }

        postStore.upsertPost({
          id: existingPost ? existingPost.id : undefined,
          title,
          content,
          createdAt: existingPost ? existingPost.createdAt : undefined
        });

        setStatus("Saved. Returning to notes...", "success");
        window.setTimeout(() => {
          window.location.href = "./index.html?saved=1";
        }, 220);
      }

      function onKeydown(event) {
        const isSave = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s";
        if (!isSave) return;
        event.preventDefault();
        onSave();
      }

      function setStatus(message, type) {
        statusEl.className = "status";
        if (type === "error") statusEl.classList.add("error");
        if (type === "success") statusEl.classList.add("success");
        statusEl.textContent = message;
      }
    })();
  </script>
</body>
</html>
